<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Electricos</title>
    <link rel="icon" href="./assets/logorobcodesolutions.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            background-color: #071321;
            background-image:
                radial-gradient(circle at 16% 18%, rgba(124, 196, 255, 0.18) 0%, rgba(0, 0, 0, 0) 36%),
                radial-gradient(circle at 84% 16%, rgba(82, 148, 235, 0.16) 0%, rgba(0, 0, 0, 0) 34%),
                linear-gradient(180deg, #1f4f43 0%, #13362f 34%, #0b2422 62%, #06141a 100%),
                url('roblogo.png');
            background-size: auto, auto, cover, 520px;
            background-position: center, center, center, right 28px bottom 18px;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-drag: none;
            user-drag: none;
        }

        #game-container {
            width: min(100vw, calc(100dvh * 2));
            height: min(100dvh, calc(100vw / 2));
            max-width: 100vw;
            max-height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        #game-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg, rgba(130, 220, 183, 0.14) 0 2px, transparent 2px 46px),
                repeating-linear-gradient(90deg, rgba(130, 220, 183, 0.1) 0 2px, transparent 2px 72px),
                repeating-linear-gradient(25deg, rgba(138, 255, 214, 0.08) 0 1px, transparent 1px 58px);
            background-size: 100% 100%, 100% 100%, 180px 180px;
            opacity: 0.42;
            z-index: 1;
        }

        #game-container::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(158, 255, 218, 0.26) 0 2px, transparent 2px) 7% 20% / 220px 2px no-repeat,
                linear-gradient(90deg, rgba(158, 255, 218, 0.24) 0 2px, transparent 2px) 28% 58% / 320px 2px no-repeat,
                linear-gradient(90deg, rgba(158, 255, 218, 0.22) 0 2px, transparent 2px) 54% 32% / 290px 2px no-repeat,
                linear-gradient(90deg, rgba(158, 255, 218, 0.18) 0 2px, transparent 2px) 66% 70% / 260px 2px no-repeat,
                linear-gradient(0deg, rgba(158, 255, 218, 0.2) 0 2px, transparent 2px) 25% 20% / 2px 160px no-repeat,
                linear-gradient(0deg, rgba(158, 255, 218, 0.2) 0 2px, transparent 2px) 60% 33% / 2px 150px no-repeat,
                linear-gradient(0deg, rgba(158, 255, 218, 0.2) 0 2px, transparent 2px) 82% 12% / 2px 160px no-repeat,
                radial-gradient(circle at 8% 20%, rgba(153, 255, 204, 0.42) 0 4px, transparent 5px),
                radial-gradient(circle at 22% 68%, rgba(153, 255, 204, 0.36) 0 4px, transparent 5px),
                radial-gradient(circle at 45% 30%, rgba(153, 255, 204, 0.38) 0 4px, transparent 5px),
                radial-gradient(circle at 72% 26%, rgba(153, 255, 204, 0.4) 0 4px, transparent 5px),
                radial-gradient(circle at 88% 70%, rgba(153, 255, 204, 0.32) 0 4px, transparent 5px),
                linear-gradient(135deg, rgba(175, 255, 224, 0.12) 0%, rgba(0, 0, 0, 0) 42%);
            z-index: 1;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 2;
            width: 100% !important;
            height: 100% !important;
            filter: drop-shadow(0 24px 32px rgba(0, 0, 0, 0.45));
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
        }

        #turn {
            margin: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #turn p {
            max-width: 420px;
            margin: 0;
            line-height: 1.4;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #game-container {
                visibility: hidden;
            }

            #turn {
                display: flex;
            }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            #game-container {
                transform: translateY(-14px);
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="turn">
        <p>Por favor, gira tu dispositivo a modo horizontal para jugar.</p>
    </div>
    <script type="module" src="game.js"></script>
    <script>
        function checkOrientation() {
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            const isMobile = window.innerWidth < 1024;
            const showTurn = isPortrait && isMobile;
            const turn = document.getElementById("turn");
            const gameContainer = document.getElementById("game-container");
            turn.style.display = showTurn ? "flex" : "none";
            gameContainer.style.visibility = showTurn ? "hidden" : "visible";
        }
        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("DOMContentLoaded", checkOrientation);
    </script>
</body>

</html>
