<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Electricos</title>
    <link rel="icon" href="./assets/logorobcodesolutions.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-drag: none;
            user-drag: none;
        }

        #game-container {
            width: min(100vw, calc(100dvh * 2));
            height: min(100dvh, calc(100vw / 2));
            max-width: 100vw;
            max-height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        #game-container::before {
            content: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        #game-container::after {
            content: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 2;
            width: 100% !important;
            height: 100% !important;
            filter: drop-shadow(0 24px 32px rgba(0, 0, 0, 0.45));
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
        }

        #turn {
            margin: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #turn p {
            max-width: 420px;
            margin: 0;
            line-height: 1.4;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #game-container {
                visibility: hidden;
            }

            #turn {
                display: flex;
            }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            #game-container {
                transform: translateY(-14px);
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="turn">
        <p>Por favor, gira tu dispositivo a modo horizontal para jugar.</p>
    </div>
    <script type="module" src="game.js"></script>
    <script>
        function checkOrientation() {
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            const isMobile = window.innerWidth < 1024;
            const showTurn = isPortrait && isMobile;
            const turn = document.getElementById("turn");
            const gameContainer = document.getElementById("game-container");
            turn.style.display = showTurn ? "flex" : "none";
            gameContainer.style.visibility = showTurn ? "hidden" : "visible";
        }
        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("DOMContentLoaded", checkOrientation);
    </script>
</body>

</html>
